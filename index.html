
<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/drsd8adkq/image/upload/v1768935755/berakah-_ogo_vaqkua.png" />
    <title>Berakah Business - Transformation Agricole en Afrique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #1a3a2a;
        --card-bg: #ffffff;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        color: #1a3a2a;
        transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .bg-agro-dark { background-color: #1a3a2a; }
      .text-agro-lime { color: #4CAF2F; }
      .bg-agro-lime { background-color: #4CAF2F; }
      .border-agro-lime { border-color: #4CAF2F; }
      .text-agro-dark { color: #1a3a2a; }
      
      /* Liquid Header Style - Refined for better sticky behavior */
      .liquid-nav {
        top: 1.5rem !important;
        left: 2.5% !important;
        width: 95% !important;
        border-radius: 100px !important;
        background: rgba(255, 255, 255, 0.85) !important;
        backdrop-filter: blur(20px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        box-shadow: 0 10px 40px -10px rgba(26, 58, 42, 0.15) !important;
        padding-top: 0.6rem !important;
        padding-bottom: 0.6rem !important;
      }


      @media (min-width: 1024px) {
        .liquid-nav {
            left: 5% !important;
            width: 90% !important;
        }
      }

      nav {
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) !important;
      }

      /* Custom wide container utility */
      .max-w-wide {
        max-width: 1600px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Animation for carousel */
      .fade-slide-enter { opacity: 0; transform: translateX(10px); }
      .fade-slide-active { opacity: 1; transform: translateX(0); transition: all 0.5s ease-out; }

      /* Smooth Transitions for Cards */
      .card-transition {
        transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.3s ease;
      }

      /* Back to Top entrance animation */
      @keyframes pop-in {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-pop-in {
        animation: pop-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
    </style>
